<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visual Guard — Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
:root{--bg:#0f1117;--surface:#1a1d27;--border:#2a2d37;--text:#e2e4e9;--muted:#6b7280;--accent:#818cf8;--pass:#34d399;--warn:#fbbf24;--fail:#f87171;--radius:10px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);line-height:1.5;height:100vh;overflow:hidden}
.app{display:flex;height:100vh}
.sidebar{width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-head{padding:20px 16px;border-bottom:1px solid var(--border)}
.sidebar-head h2{font-size:14px;font-weight:700;letter-spacing:.5px}
.sidebar-head p{font-size:11px;color:var(--muted);margin-top:4px}
.sidebar-nav{flex:1;overflow-y:auto;padding:8px}
.sidebar-nav button{display:block;width:100%;text-align:left;padding:8px 12px;border:none;background:none;color:var(--muted);font-size:12px;cursor:pointer;border-radius:6px;margin:1px 0;transition:all .15s}
.sidebar-nav button:hover,.sidebar-nav button.active{background:rgba(129,140,248,.12);color:var(--accent)}
.main{flex:1;overflow-y:auto;padding:24px 28px}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;gap:12px;flex-wrap:wrap}
.topbar h1{font-size:20px;font-weight:700}
.topbar-controls{display:flex;gap:8px;flex-wrap:wrap}
.topbar-controls select,.topbar-controls input{padding:7px 12px;border:1px solid var(--border);border-radius:7px;font-size:12px;background:var(--surface);color:var(--text);outline:none}
.topbar-controls select:focus,.topbar-controls input:focus{border-color:var(--accent)}
.topbar-controls button{padding:7px 14px;border:1px solid var(--border);border-radius:7px;background:var(--surface);color:var(--text);cursor:pointer;font-size:12px;transition:all .15s}
.topbar-controls button:hover{border-color:var(--accent)}
.section-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin:20px 0 10px;padding-left:12px;border-left:2px solid var(--accent)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:12px}
.card{background:var(--surface);border-radius:var(--radius);padding:14px 16px;border:1px solid var(--border);cursor:pointer;transition:all .15s;position:relative}
.card:hover{border-color:var(--accent);transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.3)}
.card.selected{border-color:var(--accent);box-shadow:0 0 0 2px rgba(129,140,248,.2)}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
.card-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;font-weight:600}
.card-value{font-size:20px;font-weight:700}
.card-trend{font-size:11px;font-weight:600}
.card-trend.up{color:var(--fail)}.card-trend.down{color:var(--pass)}.card-trend.flat{color:var(--muted)}
.card canvas{width:100%!important;height:44px!important;margin-top:6px}
/* Detail panel */
.detail-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:20px;display:none}
.detail-panel.show{display:block;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
.detail-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.detail-header h3{font-size:15px}.detail-header button{background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px}
.detail canvas{max-height:250px}
.diff-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:12px;margin-top:16px}
.diff-grid img{width:100%;border:1px solid var(--border);border-radius:8px}
.runs-list{display:flex;flex-direction:column;gap:4px;margin-top:8px}
.run-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--bg);border-radius:7px;cursor:pointer;font-size:12px;transition:all .15s}
.run-row:hover{background:rgba(129,140,248,.08)}
.run-row .run-id{font-family:monospace;font-size:11px;color:var(--muted)}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600}
.badge.pass{background:rgba(52,211,153,.15);color:var(--pass)}
.badge.changed{background:rgba(251,191,36,.15);color:var(--warn)}
.badge.baseline{background:rgba(129,140,248,.15);color:var(--accent)}
.empty{text-align:center;color:var(--muted);padding:60px 20px}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:768px){.sidebar{display:none}.main{padding:14px}.grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}.card{padding:10px 12px}.card-value{font-size:17px}}
</style>
</head>
<body>
<div class="app">
<aside class="sidebar">
<div class="sidebar-head"><h2>🔍 Visual Guard</h2><p id="sidebar-project">standalone</p></div>
<nav class="sidebar-nav" id="sidebar-nav"></nav>
</aside>
<main class="main" id="main">
<div class="loading"><div class="spinner" style="margin:0 auto 12px"></div><p style="color:var(--muted)">Loading...</p></div>
</main>
</div>
<script>
const API='/api';
const METRICS=[
  {id:'lcp',cat:'Perf',label:'LCP',warn:2000,f:v=>v>=1000?(v/1000).toFixed(2)+'s':Math.round(v)+'ms'},
  {id:'fcp',cat:'Perf',label:'FCP',warn:1500,f:v=>v>=1000?(v/1000).toFixed(1)+'s':Math.round(v)+'ms'},
  {id:'cls',cat:'Perf',label:'CLS',warn:.1,f:v=>v.toFixed(3)},
  {id:'ttfb',cat:'Perf',label:'TTFB',warn:600,f:v=>Math.round(v)+'ms'},
  {id:'dcl',cat:'Perf',label:'DCL',warn:2000,f:v=>Math.round(v)+'ms'},
  {id:'load',cat:'Perf',label:'Load',warn:3000,f:v=>Math.round(v)+'ms'},
  {id:'pixel.avgDiffRatio',cat:'Visual',label:'Diff %',warn:.01,f:v=>(v*100).toFixed(2)+'%'},
  {id:'dom.totalChanged',cat:'DOM',label:'Changes',warn:100,f:v=>v},
  {id:'layout.totalMoved',cat:'Layout',label:'Shifted',warn:50,f:v=>v},
  {id:'layout.maxMovePx',cat:'Layout',label:'Max Δ',warn:100,f:v=>Math.round(v)+'px'},
  {id:'network.addedRequests',cat:'Network',label:'New Reqs',warn:5,f:v=>v},
  {id:'quality.totalErrors',cat:'Quality',label:'Errors',warn:0,f:v=>v},
  {id:'quality.avgDurationMs',cat:'Quality',label:'Duration',warn:10000,f:v=>Math.round(v)+'ms'},
];
let S={project:'standalone',env:'development',branch:'',days:30,runs:[],charts:{},detailId:null,detailData:null};

async function api(path){const r=await fetch(API+path);if(!r.ok)throw new Error(r.status);return r.json()}
async function loadRuns(){S.runs=await api(`/runs?project=${enc(S.project)}&env=${enc(S.env)}&limit=30`)}
async function loadTrends(){S.charts={};await Promise.all(METRICS.map(async m=>{try{S.charts[m.id]=(await api(`/trends?project=${enc(S.project)}&env=${enc(S.env)}&metric=${enc(m.id)}&days=${S.days}`)).points}catch{}}))}

function ti(points,metric){
  if(!points||!Array.isArray(points))points=[];
  const allVals=points.map(p=>p.value).filter(v=>!isNaN(v));
  const realVals=allVals.filter(v=>v>0);
  if(allVals.length<2)return{val:realVals[0]??0,dir:'flat',min:realVals[0]??0,max:realVals[0]??0,has:realVals.length>0};
  const l=allVals[allVals.length-1],f=allVals[0];
  const mn=realVals.length>0?Math.min(...realVals):0,mx=realVals.length>0?Math.max(...realVals):0;
  let dir='flat';if(l>f*1.05)dir='up';else if(l<f*.95)dir='down';
  const arr=dir==='up'?'↗':dir==='down'?'↘':'→';
  return{val:l,dir,mn,mx,arr,has:realVals.length>0,warn:metric.warn?l>metric.warn:false};
}

async function loadDetail(runId){
  try{
    const r=await fetch(API+'/runs/'+runId+'?project='+enc(S.project)+'&env='+enc(S.env));
    S.detailData=await r.json();
    try{
      const mr=await fetch(API+'/runs/'+runId+'/manifest');
      if(mr.ok)S.detailManifest=await mr.json();else S.detailManifest=null
    }catch{S.detailManifest=null}
  }catch{S.detailData=null}
}

const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const enc=encodeURIComponent;
window.S=S; // expose for inline onclick handlers

function render(){
  const cats=['Perf','Visual','DOM','Layout','Network','Quality'];
  let h=`<div class="topbar"><h1>📊 ${esc(S.project)}</h1>
    <div class="topbar-controls">
      <input id="pi" value="${esc(S.project)}" placeholder="Project" style="width:140px"/>
      <select id="es"><option value="development"${S.env==='development'?' selected':''}>dev</option><option value="staging"${S.env==='staging'?' selected':''}>staging</option><option value="production"${S.env==='production'?' selected':''}>production</option></select>
      <select id="ds"><option value="7"${S.days===7?' selected':''}>7d</option><option value="14"${S.days===14?' selected':''}>14d</option><option value="30"${S.days===30?' selected':''}>30d</option><option value="90"${S.days===90?' selected':''}>90d</option></select>
      <button id="rb">🔄</button>
    </div></div>`;

  // Selected detail
  if(S.detailId){
    const m=METRICS.find(x=>x.id===S.detailId);
    const pts=S.charts[m?.id]||[];
    const t=ti(pts,m);
    const labels=pts.map(p=>new Date(p.timestamp).toLocaleDateString('zh-CN',{month:'short',day:'numeric'}));
    const vals=pts.map(p=>p.value);
    h+=`<div class="detail-panel show" id="detail-panel"><div class="detail-header"><h3>${m.label} — ${esc(S.project)}/${S.env} (${S.days}d)</h3>
      <button onclick="S.detailId=null;render()">✕</button></div>
      <div style="display:flex;gap:16px;margin-bottom:12px">
        <div><span style="color:var(--muted);font-size:11px">CURRENT</span><br><span style="font-size:22px;font-weight:700;color:${t.warn?'var(--fail)':'var(--text)'}">${typeof t.val==='number'?m.f(t.val):t.val}</span></div>
        <div><span style="color:var(--muted);font-size:11px">MIN</span><br><span style="font-size:16px">${typeof t.mn==='number'?m.f(t.mn):t.mn}</span></div>
        <div><span style="color:var(--muted);font-size:11px">MAX</span><br><span style="font-size:16px">${typeof t.mx==='number'?m.f(t.mx):t.mx}</span></div>
      </div>
      <canvas id="detail-chart"></canvas></div>`;
  }

  for(const cat of cats){
    const ms=METRICS.filter(x=>x.cat===cat);if(!ms.length)continue;
    h+=`<div class="section-title">${cat}</div><div class="grid">`;
    for(const m of ms){
      const pts=S.charts[m.id]||[],t=ti(pts,m);
      h+=`<div class="card${S.detailId===m.id?' selected':''}" data-metric="${m.id}" onclick="S.detailId='${m.id}';render();setTimeout(()=>document.getElementById('detail-panel')?.scrollIntoView({behavior:'smooth',block:'center'}),100)">
        <div class="card-top"><div class="card-label">${m.label}</div><div class="card-trend ${t.dir}">${t.arr||''} ${typeof t.val==='number'?m.f(t.val):t.val}</div></div>
        <div class="card-value" style="color:${t.warn?'var(--fail)':'var(--text)'}">${typeof t.val==='number'?m.f(t.val):t.val}</div>
        <canvas id="ch-${m.id}"></canvas></div>`;
    }
    h+=`</div>`;
  }

  // Run list
  h+=`<div class="section-title">📋 Runs</div><div class="runs-list">`;
  for(const r of S.runs.slice(0,12)){
    const ch=r.summary?.changed||0,pa=r.summary?.passed||0,fa=r.summary?.failed||0,bl=r.summary?.baseline||0;
    const st=fa>0?'fail':ch>0?'changed':bl>0?'baseline':'pass';
    const lb=fa>0?`❌ ${fa} failed`:ch>0?`⚠ ${ch} changed`:bl>0?'📸 baseline':pa>0?`✅ ${pa} passed`:'—';
    h+=`<div class="run-row" onclick="(async()=>{await loadDetail('${esc(r.id)}');render()})()">
      <span class="run-id">${esc(r.id.slice(0,14))}</span>
      <span style="font-size:11px;color:var(--muted)">${esc(r.branch)} · ${new Date(r.startedAt).toLocaleString('zh-CN',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})}</span>
      <span class="badge ${st}">${lb}</span></div>`;
  }
  h+=`</div>`;

  // Detail: diff images from manifest
  if(S.detailId && S.detailData){
    let imgs='';
    if(S.detailManifest?.scenarios){
      for(const s of S.detailManifest.scenarios){
        const art=s.artifacts||{};
        if(art.baselineScreenshot||art.currentScreenshot||art.diffScreenshot){
          imgs+=`<div class="diff-grid">`;
          if(art.baselineScreenshot)imgs+=`<div><div style="font-size:11px;color:var(--muted);margin-bottom:4px">Baseline</div><img src="data:image/png;base64,${art.baselineScreenshot}" loading="lazy"/></div>`;
          if(art.diffScreenshot)imgs+=`<div><div style="font-size:11px;color:var(--fail);margin-bottom:4px">Diff Overlay</div><img src="data:image/png;base64,${art.diffScreenshot}" loading="lazy"/></div>`;
          if(art.currentScreenshot)imgs+=`<div><div style="font-size:11px;color:var(--muted);margin-bottom:4px">Current</div><img src="data:image/png;base64,${art.currentScreenshot}" loading="lazy"/></div>`;
          imgs+=`</div>`;
        }
      }
    }
    if(imgs)h+=`<div class="section-title">🖼 Diff Images</div>${imgs}`;
  }

  document.getElementById('main').innerHTML=h;

  // Draw sparklines
  for(const m of METRICS){
    if(m.id===S.detailId)continue;
    const pts=S.charts[m.id]||[];
    const c=document.getElementById('ch-'+m.id);if(!c||pts.length<2)continue;
    const vs=pts.map(p=>p.value),ls=pts.map(p=>new Date(p.timestamp).toLocaleDateString('zh-CN',{month:'short',day:'numeric'}));
    new Chart(c,{type:'line',data:{labels:ls,datasets:[{data:vs,borderColor:m.warn&&vs[vs.length-1]>m.warn?'#f87171':'#818cf8',borderWidth:2,pointRadius:0,tension:.4,fill:false}]},
      options:{plugins:{legend:{display:false},tooltip:{mode:'index'}},scales:{x:{display:false},y:{display:false}}}
    });
  }
  // Detail chart
  if(S.detailId){
    const m=METRICS.find(x=>x.id===S.detailId);
    const pts=S.charts[S.detailId]||[];
    const dc=document.getElementById('detail-chart');
    if(dc&&pts.length>=2){
      const vs=pts.map(p=>p.value),ls=pts.map(p=>new Date(p.timestamp).toLocaleDateString('zh-CN',{month:'short',day:'numeric'}));
      new Chart(dc,{type:'line',data:{labels:ls,datasets:[{data:vs,borderColor:'#818cf8',backgroundColor:'rgba(129,140,248,.08)',borderWidth:2,pointRadius:3,pointBackgroundColor:'#818cf8',tension:.3,fill:true}]},
        options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{grid:{color:'rgba(255,255,255,.04)'}},y:{grid:{color:'rgba(255,255,255,.04)'},beginAtZero:false}}}
      });
    }
  }

  // Sidebar
  const nav=document.getElementById('sidebar-nav');
  nav.innerHTML=`<button class="active">📈 Trends</button><button>📋 All Runs</button>`;
  document.getElementById('sidebar-project').textContent=S.project;

  // Events
  document.getElementById('rb').onclick=async()=>{
    S.project=document.getElementById('pi').value.trim()||S.project;
    S.env=document.getElementById('es').value;S.days=+document.getElementById('ds').value;
    document.getElementById('main').innerHTML='<div class="loading" style="padding:80px"><div class="spinner"></div></div>';
    await Promise.all([loadRuns(),loadTrends()]);render();
  };
}

(async function(){
  try{S.runs=await api('/runs?project=standalone&env=development&limit=1');if(S.runs.length>0){S.project=S.runs[0].project;S.env=S.runs[0].env}}catch{}
  S.project||(S.project='standalone');
  await Promise.all([loadRuns(),loadTrends()]);render();
})();
</script>
</body>
</html>
